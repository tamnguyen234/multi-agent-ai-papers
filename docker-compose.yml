version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ai_papers_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-ai_papers}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-your_db_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - ai_paper_network

# Note: Backend and Agent containers can be added below for multi-container orchestration.
# Currently configured as a local database dependency for development.

networks:
  ai_paper_network:
    driver: bridge

volumes:
  mysql_data:
